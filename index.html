<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<title>Authenticating Identity</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:400px;
background:white;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.14);
overflow:hidden;
}

.header{
background:#eaf7ee;
text-align:center;
padding:22px;
}

.header h2{
margin:0;
font-size:22px;
color:#2f7d4f;
font-weight:600;
}

.divider{
width:60px;
height:3px;
background:#2f7d4f;
margin:10px auto 0;
border-radius:3px;
}

.details{
padding:28px 30px;
}

.row{
padding:12px 0;
font-size:16px;
text-align:center;
border-bottom:1px solid #eee;
}

.row:last-child{
border-bottom:none;
}

.label{
color:#2f7d4f;
font-weight:600;
display:inline;
}

.value{
color:#111;
font-weight:500;
display:inline;
}

/* Footer */

.footer{
padding:20px;
background:#fafafa;
border-top:1px solid #eee;
text-align:center;
}

/* Static Verification Badge */

.verify{
display:inline-flex;
align-items:center;
gap:8px;
background:#e8f6ec;
color:#2f7d4f;
padding:8px 14px;
border-radius:20px;
font-size:14px;
font-weight:600;
margin-bottom:4px;
}



/* Timestamp */

.timestamp{
font-size:12px;
color:#777;
margin-top:6px;
}


























.header-title{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
object-fit:contain;
}


/* Loading Screen */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

.spinner{
width:50px;
height:50px;
border:4px solid #eaf7ee;
border-top:4px solid #2f7d4f;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.loading-text{
font-size:16px;
color:#2f7d4f;
font-weight:600;
letter-spacing:0.5px;
}

  .footer-line{
width:60%;
height:1px;
background:#e5e5e5;
margin:12px auto;
}

.powered{
font-size:12px;
color:#888;
font-weight:500;
letter-spacing:0.5px;
}





</style>
</head>

<script>

/* LIVE TIME */

function updateTime(){

const now = new Date();

const day = String(now.getDate()).padStart(2,'0');
const month = String(now.getMonth()+1).padStart(2,'0');
const year = now.getFullYear();

let hours = now.getHours();
const minutes = String(now.getMinutes()).padStart(2,'0');
const seconds = String(now.getSeconds()).padStart(2,'0');

const ampm = hours >= 12 ? 'PM' : 'AM';
hours = hours % 12;
hours = hours ? hours : 12;

const formattedDate = day + "/" + month + "/" + year;
const formattedTime = hours + ":" + minutes + ":" + seconds + " " + ampm;

document.getElementById("time").innerText =
"Access Time • " + formattedDate + " • " + formattedTime;

}

updateTime();
setInterval(updateTime,1000);


/* GET ID FROM URL */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");


/* LOAD EMPLOYEE DATABASE */

fetch("employees.json")
.then(response => response.json())
.then(employees => {

if(employees[id]){

document.getElementById("name").innerText = employees[id].name;
document.getElementById("designation").innerText = employees[id].designation;
document.getElementById("empid").innerText = id;
document.getElementById("org").innerText = employees[id].org;

}else{

document.getElementById("name").innerText = "Employee Not Found";

}

})
.catch(error => {
console.log("Error loading JSON:", error);
});

  
  
  /* LOADING SCREEN */

window.onload = function(){

setTimeout(function(){

document.getElementById("loader").style.display="none";

},2500);

};
  
  
</script>
